<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus Tracker</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--card:#1e1e36;--border:#2a2a4a;--text:#e0e0f0;--text2:#8888aa;--primary:#4f46e5;--accent:#06b6d4;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);--bg-grad-1:#1a1a3e;--bg-grad-2:#16213e}
:root.light{--bg:#f2f3f8;--surface:#ffffff;--surface2:#eaecf4;--card:#ffffff;--border:#e0e2ec;--text:#18182a;--text2:#6b6f8e;--primary:#4f46e5;--accent:#0891b2;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 20px rgba(0,0,0,.04);--bg-grad-1:#ecedf4;--bg-grad-2:#e0e2f0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,var(--bg-grad-1) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,var(--bg-grad-2) 0%,transparent 60%)}
.theme-toggle{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:1rem}
.theme-toggle:hover{background:var(--surface);border-color:var(--primary)}
.app{max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:24px;backdrop-filter:blur(10px)}
header h1{font-size:1.3rem;display:flex;align-items:center;gap:10px}
header h1 span{background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;gap:12px;align-items:center}
.mode-badge{padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),#4f46e5);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.4)}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-icon{width:36px;height:36px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card .label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
.stat-card .value{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--text),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .sub{font-size:.8rem;color:var(--text2);margin-top:4px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:24px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:1rem;font-weight:600}
.card-body{padding:20px}
.schedule{position:relative;padding:0}
.schedule .hour-row{display:grid;grid-template-columns:60px 1fr;min-height:40px;border-bottom:1px solid rgba(42,42,74,.4)}
.schedule .hour-row:last-child{border-bottom:none}
.schedule .hour-label{padding:4px 12px;font-size:.7rem;color:var(--text2);border-right:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:6px}
.schedule .hour-slot{position:relative;min-height:40px;padding:2px 4px}
.task-chip{position:absolute;left:4px;right:4px;border-radius:6px;padding:4px 8px;font-size:.75rem;font-weight:500;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;z-index:2;transition:all .2s;overflow:hidden}
.task-chip:hover{transform:scale(1.02);z-index:5}
.task-chip .chip-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.task-chip .chip-time{font-size:.65rem;opacity:.8;margin-left:8px;white-space:nowrap}
.task-chip.done{opacity:.5}
.task-chip.done .chip-title{text-decoration:line-through}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state p{font-size:.9rem;margin-top:8px}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);transition:all .2s}
.task-item:hover{border-color:var(--primary)}
.task-item .color-dot{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.task-item .task-info{flex:1;min-width:0}
.task-item .task-title{font-size:.875rem;font-weight:500}
.task-item .task-meta{font-size:.75rem;color:var(--text2);display:flex;gap:12px;margin-top:2px}
.task-item .task-actions{display:flex;gap:6px;flex-shrink:0}
.task-item.done .task-title{text-decoration:line-through;color:var(--text2)}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:transparent}
.checkbox:hover{border-color:var(--primary)}
.checkbox.checked{background:var(--primary);border-color:var(--primary)}
.checkbox.checked::after{content:'\2713';color:#fff;font-size:14px;font-weight:700}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.875rem;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group input[type=color]{height:44px;padding:4px;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.cat-chip{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s;color:#fff}
.cat-chip.active{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2)}
.toast{position:fixed;bottom:30px;right:30px;padding:14px 24px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.875rem;z-index:200;transform:translateY(120px);opacity:0;transition:all .4s;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--accent)}
.toast.error{border-color:#ef4444}
.wallpaper-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.wallpaper-opt{width:100%;aspect-ratio:16/9;border-radius:8px;border:2px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden}
.wallpaper-opt:hover{border-color:var(--primary)}
.wallpaper-opt.active{border-color:var(--primary);box-shadow:0 0 16px rgba(99,102,241,.4)}
.wallpaper-opt img{width:100%;height:100%;object-fit:cover}
.wallpaper{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;transition:opacity .8s}
.gradient-1{background:linear-gradient(135deg,#0f0f1a 0%,#1a1a3e 50%,#0f0f1a 100%)}
.gradient-2{background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 30%,#2d1b3d 70%,#0a0a1a 100%)}
.gradient-3{background:linear-gradient(135deg,#0a1628 0%,#0f2a3e 40%,#1a3a2e 70%,#0a1628 100%)}
.gradient-4{background:linear-gradient(135deg,#1a0a0a 0%,#3e1a1a 40%,#2e2a1a 70%,#1a0a0a 100%)}
.gradient-5{background:linear-gradient(135deg,#0f0f1a 0%,#1a2e1a 40%,#0f1a2e 70%,#0f0f1a 100%)}
.gradient-6{background:linear-gradient(135deg,#1a1a2e 0%,#2e1a3e 40%,#1a2e3e 70%,#1a1a2e 100%)}
:root.light .gradient-1{background:linear-gradient(135deg,#e8e8f2 0%,#d0d0ea 50%,#e8e8f2 100%)}
:root.light .gradient-2{background:linear-gradient(135deg,#e8e0f0 0%,#d8c8ec 30%,#e8d8f0 70%,#e8e0f0 100%)}
:root.light .gradient-3{background:linear-gradient(135deg,#e0e8f0 0%,#c8dce8 40%,#d0e8e0 70%,#e0e8f0 100%)}
:root.light .gradient-4{background:linear-gradient(135deg,#f0e0e0 0%,#f0d0d0 40%,#f0ece0 70%,#f0e0e0 100%)}
:root.light .gradient-5{background:linear-gradient(135deg,#e8f0e8 0%,#d8f0d8 40%,#d8e0f0 70%,#e8f0e8 100%)}
:root.light .gradient-6{background:linear-gradient(135deg,#e8e8f0 0%,#f0e0f8 40%,#e0e8f8 70%,#e8e8f0 100%)}
.tabs{display:flex;gap:2px;padding:4px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;border-radius:7px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:.8rem;font-weight:500;transition:all .2s}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.category-pie{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.cat-stat{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;background:var(--surface);font-size:.8rem}
.cat-stat .dot{width:10px;height:10px;border-radius:50%}
.cat-stat .count{font-weight:600;color:var(--text)}
.cat-stat .name{color:var(--text2)}
.loading{text-align:center;padding:40px;color:var(--text2)}
.loading::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s ease}
.date-nav{display:flex;align-items:center;gap:6px}
.date-nav button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s}
.date-nav button:hover{background:var(--surface);border-color:var(--primary)}
.date-nav .date-label{font-size:.8rem;font-weight:500;color:var(--text);min-width:140px;text-align:center;cursor:pointer;padding:4px 8px;border-radius:6px}
.date-nav .date-label:hover{background:var(--card)}
.date-nav input[type=date]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.search-input{width:100%;padding:10px 14px 10px 36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.875rem;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--primary)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.85rem}
.task-chip .chip-edit{width:18px;height:18px;border:none;background:rgba(255,255,255,.2);border-radius:4px;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:.6rem;margin-left:4px;flex-shrink:0}
.task-chip:hover .chip-edit{display:flex}
.task-chip .chip-edit:hover{background:rgba(255,255,255,.4)}
.confirm-msg{color:var(--text2);font-size:.9rem;margin-bottom:24px;line-height:1.5}
.modal-overlay.z-higher{z-index:150}
.current-hour{border-left:3px solid var(--accent)!important}
.current-hour .hour-label{color:var(--accent)!important;font-weight:700}
.chip-toggle{cursor:pointer}
:root.light .schedule .hour-row{border-color:rgba(0,0,0,.06)}
:root.light .schedule .hour-label{border-color:var(--border)}
:root.light .task-item .task-meta{color:#8b8fa8}
:root.light .cat-chip.active{border-color:rgba(79,70,229,.3);box-shadow:0 0 16px rgba(79,70,229,.15)}
:root.light .stat-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08)}
:root.light .modal{box-shadow:0 8px 40px rgba(0,0,0,.12)}
:root.light .toast{box-shadow:0 4px 24px rgba(0,0,0,.1)}
:root.light .form-group input:focus,.form-group select:focus{box-shadow:0 0 0 3px rgba(79,70,229,.12)}
:root.light .btn-ghost:hover{background:var(--surface2)}
:root.light header{backdrop-filter:blur(12px)}
:root.light .checkbox{border-color:#c8cad8}
:root.light .checkbox:hover{border-color:var(--primary)}
:root.light .date-nav button{background:var(--surface);border-color:#d8dae6}
:root.light .date-nav button:hover{background:var(--surface2);border-color:var(--primary)}
:root.light .search-input{background:var(--surface);border-color:#d8dae6}
:root.light .search-input:focus{box-shadow:0 0 0 3px rgba(79,70,229,.12)}
:root.light .cat-chip.active{border-color:rgba(79,70,229,.4);box-shadow:0 0 12px rgba(79,70,229,.15)}
:root.light .current-hour{border-left-color:var(--primary)!important}
:root.light .current-hour .hour-label{color:var(--primary)!important}
:root.light .wallpaper-opt.active{border-color:var(--primary);box-shadow:0 0 16px rgba(79,70,229,.2)}
:root.light .modal-overlay{background:rgba(0,0,0,.25)}
@media(max-width:600px){header{flex-direction:column;gap:12px;text-align:center}.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}.schedule .hour-row{grid-template-columns:40px 1fr}.schedule .hour-label{font-size:.6rem;padding:4px 6px}}
</style>
</head>
<body>
<div class="wallpaper gradient-1" id="wallpaper"></div>
<div class="app">
  <header>
    <h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> <span>Syllabus Tracker</span></h1>
    <div class="header-actions">
      <div class="date-nav">
        <button onclick="shiftDay(-1)" title="Previous day">&#9664;</button>
        <span class="date-label" onclick="document.getElementById('datePicker').showPicker?document.getElementById('datePicker').showPicker():document.getElementById('datePicker').focus()" id="dateLabel">Today</span>
        <input type="date" id="datePicker" onchange="goToDate(this.value)">
        <button onclick="shiftDay(1)" title="Next day">&#9654;</button>
        <button onclick="goToToday()" title="Today" style="width:auto;padding:0 10px;font-size:.65rem">Today</button>
      </div>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
      <span class="mode-badge" id="modeBadge">Live</span>
    </div>
  </header>

  <div class="tabs" id="tabBar">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="schedule">Schedule</button>
    <button class="tab" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div id="tabDashboard" class="tab-content">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="label">Total Tasks</div><div class="value" id="statTotal">0</div></div>
      <div class="stat-card"><div class="label">Done</div><div class="value" id="statDone">0</div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="sub" id="progressLabel">0% today</div></div>
      <div class="stat-card"><div class="label">Best Streak</div><div class="value" id="statStreak">0</div><div class="sub">consecutive days</div></div>
      <div class="stat-card"><div class="label">Hours Scheduled</div><div class="value" id="statHours">0</div><div class="sub" id="statHoursDate">today</div></div>
      <div class="stat-card"><div class="label">Categories</div><div class="value" id="statCats">0</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Categories Breakdown</h2></div>
      <div class="card-body"><div class="category-pie" id="categoryBreakdown"></div></div>
    </div>
  </div>

  <div id="tabSchedule" class="tab-content" style="display:none">
    <div class="card">
      <div class="card-header"><h2 id="scheduleTitle">Schedule</h2><button class="btn btn-sm btn-primary" onclick="openAddModal()">+ Add Task</button></div>
      <div class="card-body schedule" id="scheduleGrid"></div>
    </div>
  </div>

  <div id="tabTasks" class="tab-content" style="display:none">
    <div class="card">
      <div class="card-header"><h2>All Tasks</h2><button class="btn btn-sm btn-primary" onclick="openAddModal()">+ Add Task</button></div>
      <div class="card-body">
        <div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" class="search-input" id="taskSearch" placeholder="Search tasks..." oninput="renderTasks()"></div>
        <div class="cat-chips" id="filterChips"></div>
        <div style="margin-top:16px"><div class="task-list" id="taskList"></div></div>
      </div>
    </div>
  </div>

  <div id="tabSettings" class="tab-content" style="display:none">
    <div class="card">
      <div class="card-header"><h2>Wallpaper</h2></div>
      <div class="card-body">
        <div class="wallpaper-grid" id="wallpaperGrid"></div>
        <div class="form-group" style="margin-top:16px">
          <label>Custom Wallpaper URL</label>
          <input type="text" id="customWallpaperInput" placeholder="https://example.com/image.jpg" onchange="setCustomWallpaper(this.value)">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Categories & Colors</h2></div>
      <div class="card-body"><div id="categorySettings"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h3 id="modalTitle">Add Task</h3>
    <input type="hidden" id="taskId">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="taskTitle" placeholder="Enter task title">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="taskCategory"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start</label>
        <input type="time" id="taskStart" value="09:00">
      </div>
      <div class="form-group">
        <label>End</label>
        <input type="time" id="taskEnd" value="10:00">
      </div>
    </div>
    <div class="form-group">
      <label>Color</label>
      <input type="color" id="taskColor" value="#4f46e5">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveTaskBtn" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay z-higher" id="confirmModal">
  <div class="modal" style="max-width:380px">
    <h3 id="confirmTitle">Confirm</h3>
    <p class="confirm-msg" id="confirmMsg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
let state = { tasks: [], categories: {}, colors: {}, wallpaper: 'gradient_1', customWallpaper: null, theme: 'dark', today: '', viewDate: '' };
let isOnline = true;
let filterCategory = null;
let confirmResolver = null;

function getApi(path, opts) { return fetch(API_BASE + path, opts).then(r => r.ok ? r.json() : Promise.reject(r.status)); }
function isFlaskMode() { return window.location.port === '5050' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'; }

async function loadData() {
  if (isFlaskMode()) {
    try {
      const data = await getApi('/api/tasks');
      const cats = await getApi('/api/categories');
      const wp = await getApi('/api/wallpaper');
      state.tasks = data.tasks; state.today = data.today;
      state.categories = cats.categories; state.colors = cats.colors;
      state.wallpaper = wp.wallpaper; state.customWallpaper = wp.custom; state.theme = wp.theme || 'dark';
      state.viewDate = state.today;
      applyTheme(state.theme);
      isOnline = true;
      document.getElementById('modeBadge').textContent = 'Live';
      document.getElementById('modeBadge').style.borderColor = '#10b981';
      return;
    } catch(e) { isOnline = false; }
  }
  loadLocal();
}

function loadLocal() {
  document.getElementById('modeBadge').textContent = 'Offline';
  document.getElementById('modeBadge').style.borderColor = '#f59e0b';
  isOnline = false;
  try {
    const d = JSON.parse(localStorage.getItem('syllabus_data')) || {};
    state.tasks = d.tasks || [];
    state.categories = d.categories || ['Study','Gym','Art of Living','Coding','IIT Madras','Other'];
    state.colors = d.colors || {'Study':'#4f46e5','Gym':'#ef4444','Art of Living':'#10b981','Coding':'#f59e0b','IIT Madras':'#06b6d4','Other':'#64748b'};
    state.wallpaper = d.wallpaper || 'gradient_1';
    state.customWallpaper = d.customWallpaper || null;
    state.theme = d.theme || 'dark';
  } catch(e) {
    state.tasks = [];
    state.categories = ['Study','Gym','Art of Living','Coding','IIT Madras','Other'];
    state.colors = {'Study':'#4f46e5','Gym':'#ef4444','Art of Living':'#10b981','Coding':'#f59e0b','IIT Madras':'#06b6d4','Other':'#64748b'};
  }
  applyTheme(state.theme);
  state.today = new Date().toISOString().split('T')[0];
  state.viewDate = state.today;
  saveLocal();
}

function saveLocal() {
  if (!isOnline) {
    localStorage.setItem('syllabus_data', JSON.stringify({
      tasks: state.tasks, categories: state.categories, colors: state.colors,
      wallpaper: state.wallpaper, customWallpaper: state.customWallpaper, theme: state.theme
    }));
  }
}

function applyTheme(theme) {
  state.theme = theme;
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('themeToggle').innerHTML = theme === 'light' ? '&#9790;' : '&#9789;';
}

function toggleTheme() {
  const newTheme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  saveLocal();
  if (isOnline && isFlaskMode()) {
    getApi('/api/wallpaper', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({theme:newTheme}) }).catch(()=>{});
  }
  showToast(newTheme === 'light' ? 'Light mode' : 'Dark mode', 'success');
}

function fmtDate(d) { return d.toISOString().split('T')[0]; }
function parseDate(str) { const p = str.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

function updateDateNav() {
  const d = parseDate(state.viewDate);
  const todayStr = state.today;
  const opts = { weekday:'short', month:'short', day:'numeric' };
  const label = state.viewDate === todayStr ? 'Today' : d.toLocaleDateString('en-US', opts);
  document.getElementById('dateLabel').textContent = label;
  document.getElementById('datePicker').value = state.viewDate;
  document.getElementById('scheduleTitle').textContent = label + ' Schedule';
}

function shiftDay(delta) {
  const d = parseDate(state.viewDate);
  d.setDate(d.getDate() + delta);
  state.viewDate = fmtDate(d);
  updateDateNav(); refreshAll();
}

function goToDate(dateStr) {
  if (dateStr) { state.viewDate = dateStr; updateDateNav(); refreshAll(); }
}

function goToToday() {
  state.viewDate = state.today; updateDateNav(); refreshAll();
}

function showConfirm(msg, btnText) {
  return new Promise(resolve => {
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmBtn').textContent = btnText || 'Delete';
    document.getElementById('confirmModal').classList.add('active');
    confirmResolver = resolve;
  });
}
function closeConfirm(val) {
  document.getElementById('confirmModal').classList.remove('active');
  if (confirmResolver) { confirmResolver(val || false); confirmResolver = null; }
}
document.getElementById('confirmBtn').addEventListener('click', () => closeConfirm(true));
document.getElementById('confirmModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeConfirm(false); });

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    document.getElementById('tab' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).style.display = '';
    if (tab.dataset.tab === 'tasks') renderTasks();
    if (tab.dataset.tab === 'schedule') { updateDateNav(); renderSchedule(); }
    if (tab.dataset.tab === 'dashboard') { updateDateNav(); renderDashboard(); }
    if (tab.dataset.tab === 'settings') renderSettings();
  });
});

// API calls
async function apiGetTasks() {
  if (isOnline && isFlaskMode()) {
    const data = await getApi('/api/tasks');
    state.tasks = data.tasks; state.today = data.today;
    return;
  }
  loadLocal();
}

async function apiAddTask(task) {
  if (isOnline && isFlaskMode()) {
    const data = await getApi('/api/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(task) });
    state.tasks.push(data.task); state.today = data.today;
    return data.task;
  }
  task.id = Date.now(); task.done_dates = []; task.archived = false;
  state.tasks.push(task); saveLocal();
  return task;
}

async function apiUpdateTask(id, updates) {
  if (isOnline && isFlaskMode()) {
    const data = await getApi('/api/tasks/' + id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updates) });
    Object.assign(state.tasks.find(t => t.id === id), data.task);
    return;
  }
  const t = state.tasks.find(t => t.id === id);
  if (t) Object.assign(t, updates); saveLocal();
}

async function apiDeleteTask(id) {
  if (isOnline && isFlaskMode()) {
    await getApi('/api/tasks/' + id, { method:'DELETE' });
    state.tasks = state.tasks.filter(t => t.id !== id);
    return;
  }
  state.tasks = state.tasks.filter(t => t.id !== id); saveLocal();
}

async function apiToggleTask(id, date) {
  if (isOnline && isFlaskMode()) {
    const data = await getApi('/api/tasks/' + id + '/toggle', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date:date||state.today}) });
    const t = state.tasks.find(t => t.id === id);
    if (t) { if (data.done) t.done_dates.push(date||state.today); else t.done_dates = t.done_dates.filter(d => d !== (date||state.today)); }
    return data.done;
  }
  const t = state.tasks.find(t => t.id === id);
  if (!t) return false;
  const d = date || state.today;
  if (t.done_dates.includes(d)) t.done_dates = t.done_dates.filter(dd => dd !== d);
  else t.done_dates.push(d);
  saveLocal();
  return t.done_dates.includes(d);
}

async function apiGetStats() {
  if (isOnline && isFlaskMode()) {
    return getApi('/api/stats');
  }
  const today = state.today;
  const tasks = state.tasks.filter(t => !t.archived);
  const allDates = new Set();
  tasks.forEach(t => t.done_dates.forEach(d => allDates.add(d)));
  let streak = 0;
  let d = new Date();
  while (allDates.has(fmtDate(d))) { streak++; d.setDate(d.getDate() - 1); }
  if (streak === 0) {
    d = new Date(); d.setDate(d.getDate() - 1);
    while (allDates.has(fmtDate(d))) { streak++; d.setDate(d.getDate() - 1); }
  }
  return {
    total: tasks.length,
    done_today: tasks.filter(t => t.done_dates.includes(today)).length,
    streak: streak,
    categories: tasks.reduce((a,t) => { a[t.category] = (a[t.category]||0)+1; return a; }, {})
  };
}

// Rendering
function renderDashboard() {
  apiGetStats().then(stats => {
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statDone').textContent = stats.done_today;
    document.getElementById('statStreak').textContent = stats.streak;
    const pct = stats.total > 0 ? Math.round(stats.done_today / stats.total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = stats.done_today + '/' + stats.total + ' (' + pct + '%)';
    document.getElementById('statCats').textContent = Object.keys(stats.categories).length;
    const vd = state.viewDate || state.today;
    const dayTasks = state.tasks.filter(t => !t.archived);
    let totalMin = 0;
    dayTasks.forEach(t => {
      const sh = parseInt(t.start.split(':')[0]), sm = parseInt(t.start.split(':')[1]);
      const eh = parseInt(t.end.split(':')[0]), em = parseInt(t.end.split(':')[1]);
      totalMin += (eh * 60 + em) - (sh * 60 + sm);
    });
    const hrs = Math.floor(totalMin / 60), mins = totalMin % 60;
    document.getElementById('statHours').textContent = hrs + 'h' + (mins > 0 ? ' ' + mins + 'm' : '');
    const d = parseDate(vd);
    document.getElementById('statHoursDate').textContent = vd === state.today ? 'today' : d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const bd = document.getElementById('categoryBreakdown');
    bd.innerHTML = Object.entries(stats.categories).map(([cat,count]) =>
      `<div class="cat-stat"><span class="dot" style="background:${state.colors[cat]||'#64748b'}"></span><span class="name">${cat}</span><span class="count">${count}</span></div>`
    ).join('');
  });
}

function renderSchedule() {
  const grid = document.getElementById('scheduleGrid');
  const viewDate = state.viewDate || state.today;
  const tasks = state.tasks.filter(t => !t.archived).sort((a,b) => a.start.localeCompare(b.start));
  if (!tasks.length) { grid.innerHTML = '<div class="empty-state"><p>No tasks yet. Click "+ Add Task" to get started.</p></div>'; return; }
  const now = new Date();
  const currentHour = now.getHours();
  const maxH = {};
  tasks.forEach(t => {
    const sh = parseInt(t.start), sm = parseInt(t.start.split(':')[1]);
    const eh = parseInt(t.end), em = parseInt(t.end.split(':')[1]);
    const h = ((eh - sh) + (em - sm) / 60) * 40;
    const startH = sh;
    if (!maxH[startH] || h > maxH[startH]) maxH[startH] = Math.max(h, 40);
  });
  let html = '';
  for (let h = 0; h < 24; h++) {
    const label = String(h).padStart(2,'0') + ':00';
    const isCurrent = viewDate === state.today && h === currentHour;
    const slotH = Math.max(40, maxH[h] || 40);
    const slots = tasks.filter(t => parseInt(t.start) === h);
    html += `<div class="hour-row${isCurrent?' current-hour':''}" id="hourRow${h}"><div class="hour-label">${label}</div><div class="hour-slot" style="min-height:${slotH}px">`;
    slots.forEach(t => {
      const sm = parseInt(t.start.split(':')[1]);
      const sh = parseInt(t.start), eh = parseInt(t.end), em = parseInt(t.end.split(':')[1]);
      const top = (sm / 60) * 40;
      const height = ((eh - sh) + (em - sm) / 60) * 40;
      const done = t.done_dates.includes(viewDate);
      html += `<div class="task-chip chip-toggle${done?' done':''}" style="top:${top}px;height:${Math.max(height,20)}px;background:${t.color}" onclick="toggleTask(${t.id})" ondblclick="event.stopPropagation();editTask(${t.id})" title="${t.title} (double-click to edit)">
        <span class="chip-title">${t.title}</span>
        <span class="chip-time">${t.start}-${t.end}</span>
        <button class="chip-edit" onclick="event.stopPropagation();editTask(${t.id})" title="Edit">&#9998;</button>
      </div>`;
    });
    html += '</div></div>';
  }
  grid.innerHTML = html;
  if (viewDate === state.today) {
    const row = document.getElementById('hourRow' + currentHour);
    if (row) setTimeout(() => row.scrollIntoView({ behavior:'smooth', block:'center' }), 100);
  }
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const chips = document.getElementById('filterChips');
  const cats = state.categories;
  const query = (document.getElementById('taskSearch').value || '').toLowerCase().trim();
  const viewDate = state.viewDate || state.today;
  chips.innerHTML = '<div class="cat-chip" style="background:#64748b'+(filterCategory===null?';border-color:#fff"':'"')+'" onclick="setFilter(null)">All</div>' +
    cats.map(c => `<div class="cat-chip" style="background:${state.colors[c]||'#64748b'}${filterCategory===c?';border-color:#fff"':'"'}" onclick="setFilter('${c}')">${c}</div>`).join('');
  let filtered = state.tasks.filter(t => !t.archived);
  if (filterCategory) filtered = filtered.filter(t => t.category === filterCategory);
  if (query) filtered = filtered.filter(t => t.title.toLowerCase().includes(query));
  if (!filtered.length) { list.innerHTML = '<div class="empty-state"><p>No tasks found.</p></div>'; return; }
  filtered.sort((a,b) => a.start.localeCompare(b.start));
  list.innerHTML = filtered.map(t => {
    const done = t.done_dates.includes(viewDate);
    return `<div class="task-item${done?' done':''}">
      <div class="checkbox${done?' checked':''}" onclick="toggleTask(${t.id})"></div>
      <div class="color-dot" style="background:${t.color}"></div>
      <div class="task-info">
        <div class="task-title">${t.title}</div>
        <div class="task-meta"><span>${t.category}</span><span>${t.start} - ${t.end}</span></div>
      </div>
      <div class="task-actions">
        <button class="btn btn-sm btn-ghost btn-icon" onclick="editTask(${t.id})" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="btn btn-sm btn-danger btn-icon" onclick="deleteTask(${t.id})" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div>
    </div>`;
  }).join('');
}

function setFilter(cat) { filterCategory = cat; renderTasks(); }

function renderSettings() {
  const wg = document.getElementById('wallpaperGrid');
  const grads = ['gradient_1','gradient_2','gradient_3','gradient_4','gradient_5','gradient_6'];
  wg.innerHTML = grads.map(g => `<div class="wallpaper-opt ${state.wallpaper===g?'active':''}" onclick="setWallpaper('${g}')"><div class="${g}" style="width:100%;height:100%"></div></div>`).join('');
  document.getElementById('customWallpaperInput').value = state.customWallpaper || '';
  const cs = document.getElementById('categorySettings');
  cs.innerHTML = state.categories.map(c => {
    const col = state.colors[c] || '#64748b';
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="width:14px;height:14px;border-radius:50%;background:${col}"></span>
      <span style="flex:1;font-size:.875rem">${c}</span>
      <input type="color" value="${col}" onchange="updateCategoryColor('${c}',this.value)" style="width:36px;height:30px;padding:2px;border-radius:6px;background:transparent;border:1px solid var(--border);cursor:pointer">
    </div>`;
  }).join('');
}

// Modal
function openAddModal(cat) {
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('taskId').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskStart').value = '09:00';
  document.getElementById('taskEnd').value = '10:00';
  document.getElementById('taskColor').value = state.colors[cat||'Other']||'#4f46e5';
  document.getElementById('saveTaskBtn').textContent = 'Add';
  document.getElementById('saveTaskBtn').disabled = false;
  document.getElementById('saveTaskBtn').style.opacity = '1';
  const sel = document.getElementById('taskCategory');
  sel.innerHTML = state.categories.map(c => `<option value="${c}"${c===cat?' selected':''}>${c}</option>`).join('');
  document.getElementById('taskModal').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function editTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('taskId').value = id;
  document.getElementById('taskTitle').value = t.title;
  document.getElementById('taskStart').value = t.start;
  document.getElementById('taskEnd').value = t.end;
  document.getElementById('taskColor').value = t.color;
  document.getElementById('saveTaskBtn').textContent = 'Update';
  document.getElementById('saveTaskBtn').disabled = false;
  document.getElementById('saveTaskBtn').style.opacity = '1';
  const sel = document.getElementById('taskCategory');
  sel.innerHTML = state.categories.map(c => `<option value="${c}"${c===t.category?' selected':''}>${c}</option>`).join('');
  document.getElementById('taskModal').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal() { document.getElementById('taskModal').classList.remove('active'); }

async function saveTask() {
  const btn = document.getElementById('saveTaskBtn');
  if (btn.disabled) return;
  const id = document.getElementById('taskId').value;
  const data = {
    title: document.getElementById('taskTitle').value.trim() || 'Untitled',
    category: document.getElementById('taskCategory').value,
    start: document.getElementById('taskStart').value,
    end: document.getElementById('taskEnd').value,
    color: document.getElementById('taskColor').value
  };
  if (data.start >= data.end) { showToast('End time must be after start time', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Saving...'; btn.style.opacity = '.6';
  try {
    if (id) { await apiUpdateTask(parseInt(id), data); showToast('Task updated', 'success'); }
    else { await apiAddTask(data); showToast('Task added', 'success'); }
    closeModal();
    refreshAll();
  } catch(e) { showToast('Failed to save task', 'error'); }
  btn.disabled = false; btn.textContent = id ? 'Update' : 'Add'; btn.style.opacity = '1';
}

async function deleteTask(id) {
  const confirmed = await showConfirm('Delete this task? This cannot be undone.', 'Delete');
  if (!confirmed) return;
  try {
    await apiDeleteTask(id);
    showToast('Task deleted', 'success');
    refreshAll();
  } catch(e) { showToast('Failed to delete task', 'error'); }
}

async function toggleTask(id) {
  try {
    await apiToggleTask(id, state.viewDate || state.today);
    refreshAll();
  } catch(e) { showToast('Failed to toggle task', 'error'); }
}

async function setWallpaper(g) {
  state.wallpaper = g; state.customWallpaper = null;
  document.getElementById('wallpaper').className = 'wallpaper ' + g;
  if (isOnline && isFlaskMode()) {
    try { await getApi('/api/wallpaper', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({wallpaper:g,custom_wallpaper:null}) }); } catch(e){}
  }
  saveLocal(); renderSettings(); showToast('Wallpaper changed', 'success');
}

async function setCustomWallpaper(url) {
  state.wallpaper = 'custom'; state.customWallpaper = url || null;
  if (url) document.getElementById('wallpaper').style.background = 'url('+url+') center/cover';
  else document.getElementById('wallpaper').className = 'wallpaper gradient_1';
  if (isOnline && isFlaskMode()) {
    try { await getApi('/api/wallpaper', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({wallpaper:'custom',custom_wallpaper:url||null}) }); } catch(e){}
  }
  saveLocal();
}

function updateCategoryColor(cat, color) {
  state.colors[cat] = color;
  if (isOnline && isFlaskMode()) {
    state.tasks.filter(t => t.category === cat).forEach(t => { t.color = color; apiUpdateTask(t.id, {color:color}); });
  } else saveLocal();
  showToast('Color updated', 'success');
}

function refreshAll() {
  const active = document.querySelector('.tab.active');
  if (active) {
    const tab = active.dataset.tab;
    if (tab === 'dashboard') renderDashboard();
    if (tab === 'schedule') renderSchedule();
    if (tab === 'tasks') renderTasks();
    if (tab === 'settings') renderSettings();
  }
}


document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(false); }
  if (e.key === 'Enter' && document.getElementById('taskModal').classList.contains('active') && e.target.closest('.modal')) {
    e.preventDefault(); saveTask();
  }
});

// Init
(async function init() {
  await loadData();
  state.viewDate = state.today;
  updateDateNav();
  document.getElementById('wallpaper').className = 'wallpaper ' + (state.wallpaper||'gradient_1');
  if (state.customWallpaper) document.getElementById('wallpaper').style.background = 'url('+state.customWallpaper+') center/cover';
  renderDashboard();
  renderSchedule();
  renderTasks();
  renderSettings();
})();
</script>
</body>
